services:
  algotrading:
    build:
      context: .
      dockerfile: Dockerfile
    image: algotrading-v2:latest
    container_name: algotrading-v2
    restart: unless-stopped
    ports:
      # Host:Container — open http://<pi-ip>:8000
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      TZ: Europe/Madrid
      PYTHONPATH: /app
      # Optional overrides (compose wins over .env if set here)
      # API_KEY_DEMO: ""
      # API_SECRET_DEMO: ""
      # API_KEY_LIVE: ""
      # API_SECRET_LIVE: ""
      # TELEGRAM_BOT_TOKEN: ""
      # TELEGRAM_CHAT_ID: ""
    volumes:
      # Edit strategies on the host without rebuilding the image
      - ./strategies:/app/strategies
      - ./logs:/app/logs
      # Telegram alerts + saved alert definitions (persisted on host)
      - ./alerts:/app/alerts
    # Uncomment on 64-bit Raspberry Pi OS if you build elsewhere and pull:
    # platform: linux/arm64
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/strategies"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
